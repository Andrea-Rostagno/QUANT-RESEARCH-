# DAX M1 Quant Research Lab - Main Configuration

mt5:
  symbol: "XGER30"
  timeframe_base: "M1"
  timeframes_derived: ["M3", "M5", "M15", "M30"]

  start_date: "2022-01-01"
  end_date: null

  server_timezone: "Etc/UTC"

  aux_symbols:
    - symbol: "XUS30"
      enabled: true
    - symbol: "XUS500"
      enabled: true
    - symbol: "XUSTEC"
      enabled: true
    - symbol: "EURUSD"
      enabled: true
    - symbol: "XAUUSD"
      enabled: true
    - symbol: "XEU50"
      enabled: true

features:
  ema_periods: [8, 16, 24, 64, 200]
  atr_period: 14
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  bbands_period: 20
  bbands_std: 2.0
  adx_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  realized_vol_windows: [5, 15, 30, 60]
  rolling_vol_windows: [20, 60, 120, 240]
  zscore_windows: [20, 60, 120]
  volume_zscore_window: 20
  lead_lag_max_lag: 5

labeling:
  atr_tp_multiples: [1.5, 2.0, 3.0]
  atr_sl_multiples: [1.0, 1.5, 2.0]
  horizons_minutes: [5, 15, 30, 60]
  min_atr_multiplier: 1.0
  barrier_atr_period: 14

backtest:
  spread_points: 1.0
  slippage_points: 0.5
  commission_per_lot: 7.0
  lot_size: 1.0
  point_value: 1.0
  max_holding_bars: 60
  one_position_at_a_time: true

  session_start_utc: "07:00"
  session_end_utc: "21:00"

  min_trades: 30

validation:
  n_splits: 5
  train_pct: 0.7
  purge_bars: 60
  embargo_bars: 10

paths:
  raw: "data/raw"
  interim: "data/interim"
  processed: "data/processed"
  features: "data/features"
  models: "models"
  reports: "reports"
